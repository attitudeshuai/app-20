server:
  port: 8090
  servlet:
    context-path: /

spring:
  application:
    name: instrument-room
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:instrumentroom}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USER:app_user}
    password: ${DB_PASSWORD:app_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@instrumentroom.com}
    password: ${MAIL_PASSWORD:password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000

jwt:
  secret: ${JWT_SECRET:instrumentroom-default-secret-key-must-be-at-least-256-bits-long-for-security}
  expiration: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

notification:
  email:
    enabled: ${NOTIFICATION_EMAIL_ENABLED:false}
  sms:
    enabled: ${NOTIFICATION_SMS_ENABLED:false}

waitlist:
  default-priority: ${WAITLIST_DEFAULT_PRIORITY:10}
  max-priority: ${WAITLIST_MAX_PRIORITY:100}
  min-priority: ${WAITLIST_MIN_PRIORITY:0}
  max-per-user-per-room: ${WAITLIST_MAX_PER_USER_PER_ROOM:3}
  expire-hours: ${WAITLIST_EXPIRE_HOURS:24}

logging:
  level:
    root: INFO
    com.instrumentroom: DEBUG
    org.springframework.security: INFO
