version: '3.8'
services:
  app:
    build: .
    container_name: instrumentroom_app
    ports:
      - "8091:8090"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=instrumentroom
      - DB_USER=app_user
      - DB_PASSWORD=app_pass
      - JWT_SECRET=instrumentroom-secret-key-for-jwt-token-generation-must-be-long-enough
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - instrumentroom-net

  mysql:
    image: mysql:8.0
    container_name: instrumentroom_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=instrumentroom
      - MYSQL_USER=app_user
      - MYSQL_PASSWORD=app_pass
    ports:
      - "13315:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_pass"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - instrumentroom-net

  adminer:
    image: adminer:4.8.1
    container_name: instrumentroom_adminer
    ports:
      - "8088:8080"
    depends_on:
      - mysql
    networks:
      - instrumentroom-net

volumes:
  mysql_data:

networks:
  instrumentroom-net:
    driver: bridge
